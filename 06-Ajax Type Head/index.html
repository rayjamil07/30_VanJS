<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://fav.farm/✅" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Ahead 👀</title>
</head>
<body>
    <form class="search-form">
        <input type="text" class="search" placeholder="City or State">
        <ul class="suggestions">
        <li>Filter for a city</li>
        <li>or a state</li>
        </ul>
    </form>

    <!-- TODO: 1. An array to store our cities. 2. A function that deals with the searching (where city and state can be matched) 3. A function that displays our results in our html (city, state, population) -->
    
    <!-- ? the syntax regexp, go and search more about it. -->
<script>
    // * an array to store our cities
    const cities = []; 
    const endpoints = 'https://gist.githubusercontent.com/Miserlou/c5cd8364bf9b2420bb29/raw/2bf258763cdddd704f8ffd3ea9a3e81d25e2c6f6/cities.json';

    fetch(endpoints)
        .then(response => response.json())
        .then(data => cities.push(...data))

    const findMatches = (wordToMatch, cities) => {
        return cities.filter(place => {
            //making a variable to be a regular expression
            const regex = new RegExp(wordToMatch, 'gi'); //g for global and i matches lowercase and uppercase
            return place.city.match(regex) || place.state.match(regex)
        });
    }

    //our commas for our numbers
    const numberWithCommas = (x) => {
        return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    const displayMatches = () => {
       const matchArray = findMatches(e.target.value, cities);

       const html = matchArray.map(place => {
        const regex = new RegExp(e.target.value, 'gi');
        const cityName = place.city.replace(regex, `<span class='h1'>${e.target.value}</span>`); // replacing is being done so that it can highlight on out html
        const stateName = place.state.replace(regex, `<span class='h1'>${e.target.value}</span>`);
         
        return `
            <li>
                <span class='name'>${cityName}, ${stateName}</span> 
                <span class='population'>${numberWithCommas(place.population)}</span>   
            </li>
        `
       }).join('');
       suggestions.innerHTML = html;
    }

    const searchInput = document.querySelector('.search');
    const suggestions = document.querySelector('.suggestions');

    searchInput.addEventListener('change', displayMatches);
    searchInput.addEventListener('keyup', displayMatches);

</script>
</body>
</html>
