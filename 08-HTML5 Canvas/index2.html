<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva prototype</title>
</head>
<body>
    <canvas id='canvas' width="800" height="800"></canvas>
    <script>
        //canva for putting in the work
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let isDrawing = false;
        //positions to start
        let lastX = 0;
        let lastY = 0; 
        //color
        let hue = 0;
        let direction = true;

        //setting our context, how our image will look like
        const ctx = canvas.getContext('2d');
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.lineWidth = 10;

        //function for implementing the logic part
        //colors, width and direction
        function draw (e) {
            if(!isDrawing) {
                return ;
            }
            // console.log(e)
            ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
            //updates to remember the setting
            ([lastX, lastY] = [e.offsetX, e.offsetY]);
            hue++;
            
            if (hue >= 360) {
                 hue = 0;
            }
            if (ctx.lineWidth >= 360 || ctx.lineWidth <= 1) {
                direction = !direction
            }
            if (direction) {
                ctx.lineWidth++;
            } else {
                ctx.lineWidth--;
            }
        }

        //events that listen to movement and trigger our function
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            ([lastX, lastY] = [e.offsetX, e.offsetY]);
        });
        canvas.addEventListener('mousemove', draw);
        
        canvas.addEventListener('mouseout', () => isDrawing = false);
        canvas.addEventListener('mouseup', () => isDrawing = false);
        
    </script>
</body>
</html>
